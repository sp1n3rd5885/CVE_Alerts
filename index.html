<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile CVE Monitor</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #e0e0e0;
      --text-muted: #a0a0a0;
      --accent: #0d6efd;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    h2 { margin: 0; font-size: 1.4rem; }
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .search-box {
      width: 100%;
      padding: 12px;
      margin: 16px 0;
      box-sizing: border-box;
      background: var(--card-bg);
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
    }
    .loading { text-align: center; color: var(--text-muted); padding: 30px; }
    .cve-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 6px solid #6c757d;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .severity-CRITICAL { border-left-color: #ff4d4d; }
    .severity-HIGH { border-left-color: #ff944d; }
    .severity-MEDIUM { border-left-color: #ffc107; }
    .severity-LOW { border-left-color: #28a745; }
    
    .cve-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .cve-id { font-weight: bold; color: #58a6ff; text-decoration: none; font-size: 1.1rem; }
    .badge {
      font-size: 0.8rem;
      font-weight: bold;
      padding: 4px 8px;
      border-radius: 6px;
      background: #333;
    }
    .cve-desc { font-size: 0.9rem; color: #c9d1d9; line-height: 1.5; }
    .cve-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 12px; text-align: right; }
  </style>
</head>
<body>

  <div class="header">
    <h2>⚠️ Emerging CVEs</h2>
    <button id="refresh-btn" class="btn">Refresh</button>
  </div>
  
  <input type="text" id="search-bar" class="search-box" placeholder="Search by software, vendor, or keyword...">

  <div id="loading" class="loading">Querying NVD API...</div>
  <div id="cve-container"></div>

  <script>
    let allCves = [];

    document.addEventListener('DOMContentLoaded', () => {
      fetchEmergingCVEs();
      document.getElementById('refresh-btn').addEventListener('click', fetchEmergingCVEs);
      document.getElementById('search-bar').addEventListener('input', filterCVEs);
    });

    async function fetchEmergingCVEs() {
      const container = document.getElementById('cve-container');
      const loading = document.getElementById('loading');
      loading.style.display = 'block';
      container.innerHTML = '';

      const twoDaysAgo = new Date(Date.now() - 2 * 24 * 60 * 60 * 1000);
      const now = new Date();
      const pubStartDate = twoDaysAgo.toISOString().split('.')[0];
      const pubEndDate = now.toISOString().split('.')[0];

      const url = `https://services.nvd.nist.gov/rest/json/cves/2.0/?pubStartDate=${pubStartDate}&pubEndDate=${pubEndDate}`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('NVD API rate limit hit. Try again in a minute.');
        const data = await response.json();
        allCves = data.vulnerabilities || [];
        displayCVEs(allCves);
      } catch (error) {
        container.innerHTML = `<div style="color:#ff4d4d; text-align:center; padding: 20px;">${error.message}</div>`;
      } finally {
        loading.style.display = 'none';
      }
    }

    function displayCVEs(vulnerabilities) {
      const container = document.getElementById('cve-container');
      container.innerHTML = '';

      if (vulnerabilities.length === 0) {
        container.innerHTML = '<p class="loading">No new CVEs published in the last 48 hours.</p>';
        return;
      }

      vulnerabilities.forEach(item => {
        const cve = item.cve;
        const id = cve.id;
        const descObj = cve.descriptions.find(d => d.lang === 'en');
        const description = descObj ? descObj.value : 'No description text provided.';

        let severity = 'UNKNOWN';
        let score = 'N/A';
        const metrics = cve.metrics?.cvssMetricV31?.[0] || cve.metrics?.cvssMetricV30?.[0];
        if (metrics) {
          severity = metrics.cvssData.baseSeverity;
          score = metrics.cvssData.baseScore;
        }

        const dateStr = new Date(cve.published).toLocaleDateString();

        const card = document.createElement('div');
        card.className = `cve-card severity-${severity}`;
        card.innerHTML = `
          <div class="cve-header">
            <a href="https://nvd.nist.gov/vuln/detail/${id}" target="_blank" class="cve-id">${id}</a>
            <span class="badge">${severity} (${score})</span>
          </div>
          <div class="cve-desc">${description}</div>
          <div class="cve-date">Published: ${dateStr}</div>
        `;
        container.appendChild(card);
      });
    }

    function filterCVEs() {
      const query = document.getElementById('search-bar').value.toLowerCase();
      const filtered = allCves.filter(item => {
        const id = item.cve.id.toLowerCase();
        const desc = (item.cve.descriptions.find(d => d.lang === 'en')?.value || '').toLowerCase();
        return id.includes(query) || desc.includes(query);
      });
      displayCVEs(filtered);
    }
  </script>
</body>
</html>
